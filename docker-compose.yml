version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-waiter-qdrant
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ai-waiter-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro       # menu.json + images (read-only)
    env_file:
      - apps/api/.env
    environment:
      - QDRANT_HOST=qdrant         # use service name inside Docker network
      - QDRANT_PORT=6333
      - MENU_JSON_PATH=/app/data/menu.json
      - IMAGES_DIR=/app/data/images
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
